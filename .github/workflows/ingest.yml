name: Ingest road incidents

on:
  schedule:
    # Every 5 minutes (GitHub's minimum). Note: scheduled runs may be delayed
    # by a few minutes under platform load.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      facilities:
        description: "Also reload facilities from points_of_interest.csv"
        type: boolean
        default: false

# Never let two ingest runs overlap (they clear+append per source).
concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run ingester
        working-directory: backend
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MANITOBA_511_KEY: ${{ secrets.MANITOBA_511_KEY }}
          SASKATCHEWAN_511_KEY: ${{ secrets.SASKATCHEWAN_511_KEY }}
          NB_511_KEY: ${{ secrets.NB_511_KEY }}
          NS_511_KEY: ${{ secrets.NS_511_KEY }}
          PE_511_KEY: ${{ secrets.PE_511_KEY }}
          NL_511_KEY: ${{ secrets.NL_511_KEY }}
        run: |
          if [ "${{ github.event.inputs.facilities }}" = "true" ]; then
            python -m src.ingest.run --push --facilities ../points_of_interest.csv
          else
            python -m src.ingest.run --push
          fi
